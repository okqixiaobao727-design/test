<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>发布到小红书</title>
  <style>
    body { font-family: -apple-system, sans-serif; padding: 24px; line-height: 1.6; text-align: center; }
    a.btn { display: block; margin: 40px auto 0; padding: 22px 20px;
            background: #ff2442; color: #fff; border-radius: 14px; text-decoration: none;
            font-size: 24px; font-weight: 600; max-width: 320px; }
    .hint { color: #888; margin-top: 20px; font-size: 14px; }
  </style>
</head>
<body>
  <h2>发布到小红书</h2>
  <p id="link"></p>
  <div class="hint">点上面按钮拉起「所长发布」。若无反应，右上角「用 Safari 打开」再点。</div>
  <script>
    (function () {
      var input = new URLSearchParams(location.search).get('input') || '';
      // Apple 规范：input= 只接受关键词 text|clipboard，真正内容放 text=
      var target = 'shortcuts://run-shortcut?name=' + encodeURIComponent('所长发布')
                 + '&input=text&text=' + encodeURIComponent(input);
      // 不自动跳转——iOS 对 JS 自动跳自定义协议会丢参数；必须用户手点链接才带得上 text
      document.getElementById('link').innerHTML =
        '<a class="btn" href="' + target + '">📲 发布到小红书</a>';
    })();
  </script>
</body>
</html>
