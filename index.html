<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>发布到小红书</title>
  <style>
    body { font-family: -apple-system, sans-serif; padding: 24px; line-height: 1.6; text-align: center; }
    button.btn { display: block; margin: 40px auto 0; padding: 22px 20px; border: none; cursor: pointer;
            background: #ff2442; color: #fff; border-radius: 14px;
            font-size: 24px; font-weight: 600; width: 100%; max-width: 320px; }
    .hint { color: #888; margin-top: 20px; font-size: 14px; }
    .err  { color: #c00; margin-top: 20px; font-size: 15px; display: none; }
  </style>
</head>
<body>
  <h2>发布到小红书</h2>
  <button class="btn" id="go">📲 下载视频并发布</button>
  <div class="hint">正在自动拉起「所长发布」…（若停在此页，点上面按钮）</div>
  <div class="err" id="err">写剪贴板失败。请点右上角「···」→「用 Safari 打开」后重试。</div>
  <script>
    (function () {
      // data = JSON 串 {"drive_id":"...","title":"..."}，来自 Telegram 按钮 URL 的 ?data=
      var data = new URLSearchParams(location.search).get('data') || '';
      var name = encodeURIComponent('所长发布');
      // 自动路径：把 data 直接塞进 shortcuts:// 的 text=，加载即跳转，无需手势、无需写剪贴板。
      // 快捷指令 Get dictionary from Shortcut Input 会把这段文本解析成字典。
      var textTarget = 'shortcuts://run-shortcut?name=' + name + '&input=text&text=' + encodeURIComponent(data);
      // 兜底路径：真实点击时写剪贴板 + input=clipboard（已验证可靠）。
      var clipTarget = 'shortcuts://run-shortcut?name=' + name + '&input=clipboard';
      var err = document.getElementById('err');
      // 加载即自动拉起（Telegram 内置浏览器允许加载时跳自定义协议）
      location.href = textTarget;
      // 若没被自动拉起，用户点按钮：走可靠的剪贴板路径
      document.getElementById('go').addEventListener('click', function () {
        navigator.clipboard.writeText(data).then(function () { location.href = clipTarget; })
          .catch(function () { err.style.display = 'block'; });
      });
    })();
  </script>
</body>
</html>
