<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>发布到小红书</title>
  <style>
    body { font-family: -apple-system, sans-serif; padding: 24px; line-height: 1.6; text-align: center; }
    button.btn { display: block; margin: 40px auto 0; padding: 22px 20px; border: none; cursor: pointer;
            background: #ff2442; color: #fff; border-radius: 14px;
            font-size: 24px; font-weight: 600; width: 100%; max-width: 320px; }
    .hint { color: #888; margin-top: 20px; font-size: 14px; }
    .err  { color: #c00; margin-top: 20px; font-size: 15px; display: none; }
  </style>
</head>
<body>
  <h2>发布到小红书</h2>
  <button class="btn" id="go">📲 下载视频并发布</button>
  <div class="hint">点按钮：拉起「所长发布」下载视频（标题会自动进剪贴板）。</div>
  <div class="err" id="err">写剪贴板失败。请点右上角「···」→「用 Safari 打开」后重试。</div>
  <script>
    (function () {
      // data = JSON 串 {"drive_id":"...","tags":"#a #b"}，来自 Telegram 按钮 URL 的 ?data=
      var data = new URLSearchParams(location.search).get('data') || '';
      var target = 'shortcuts://run-shortcut?name=' + encodeURIComponent('所长发布') + '&input=clipboard';
      var err = document.getElementById('err');
      document.getElementById('go').addEventListener('click', function () {
        // 必须在用户点击的同步上下文里写剪贴板（Safari 要求）
        // 剪贴板放整个 JSON；快捷指令用 input=clipboard 读它、解字典
        navigator.clipboard.writeText(data).then(function () {
          location.href = target;          // 剪贴板就绪后再拉起快捷指令
        }).catch(function () {
          err.style.display = 'block';     // webview 拒绝写剪贴板 → 提示用 Safari 打开
        });
      });
    })();
  </script>
</body>
</html>
