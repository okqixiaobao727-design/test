<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>发布到小红书</title>
  <style>
    body { font-family: -apple-system, sans-serif; padding: 24px; line-height: 1.6; text-align: center; }
    button.btn { display: block; margin: 40px auto 0; padding: 22px 20px; border: none; cursor: pointer;
            background: #ff2442; color: #fff; border-radius: 14px;
            font-size: 24px; font-weight: 600; width: 100%; max-width: 320px; }
    .hint { color: #888; margin-top: 20px; font-size: 14px; }
    .err  { color: #c00; margin-top: 20px; font-size: 15px; display: none; }
  </style>
</head>
<body>
  <h2>发布到小红书</h2>
  <button class="btn" id="go">📲 下载视频并发布</button>
  <div class="hint">正在自动拉起「所长发布」下载视频…（若没反应，点上面按钮）</div>
  <div class="err" id="err">写剪贴板失败。请点右上角「···」→「用 Safari 打开」后重试。</div>
  <script>
    (function () {
      // data = JSON 串 {"drive_id":"...","title":"..."}，来自 Telegram 按钮 URL 的 ?data=
      var data = new URLSearchParams(location.search).get('data') || '';
      var target = 'shortcuts://run-shortcut?name=' + encodeURIComponent('所长发布') + '&input=clipboard';
      var err = document.getElementById('err');
      // 写剪贴板（整个 JSON，快捷指令 input=clipboard 读它）→ 成功后拉起快捷指令
      function go() {
        return navigator.clipboard.writeText(data).then(function () { location.href = target; });
      }
      // 先自动尝试：若打开本页的那次点击带来了瞬时用户激活，writeText 会成功、免点按钮
      go().catch(function () {
        // 自动失败（无激活/webview 拒绝）→ 退回：等用户点按钮（真实点击一定有激活）
        err.style.display = 'block';
      });
      // 兜底：任何时候点按钮都能手动触发
      document.getElementById('go').addEventListener('click', function () {
        go().catch(function () { err.style.display = 'block'; });
      });
    })();
  </script>
</body>
</html>
